rejected_for_now:
  openai_agents_runtime_migration:
    reason: "Different runtime; not needed to strengthen Claude Code workflow."
  openai_guardrails_primary_layer:
    reason: "Does not directly control Claude Code built-in tools or MCP execution."
  mcp_reference_servers_as_runtime:
    reason: "Reference implementations, not the selected production runtime path."
  broad_runtime_connector_access:
    reason: "Registry may inventory broad services, but runtime access stays narrow and opt-in."

next_pr_contract:
  may_use:
    - routing.task-router-read
    - workflow.workflow-read
    - plan.route-plan-before-write
    - source.github-repo-read
    - registry.service-connector-selected
    - registry.mcp-connector-selected
    - connector.notion-progress-tracking
    - accelerator.nemotron-optional
  must_not_do:
    - enable runtime enforcement without tests
    - add managed settings lockdown
    - add elevated connector defaults
    - auto-install MCP config into target projects
    - use broad MCP toolsets such as all or default
    - use frontend-design as an active skill
