# Engineering OS capability registry
#
# Status: inventory-backed / non-runtime.
#
# This file is the deterministic decision source for which capabilities must be
# considered during task routing. It is not a runtime hook yet. Runtime
# enforcement must be added only in a later PR with dedicated tests.

version: 2
status: inventory_backed
runtime_enabled: false

coverage_contract:
  minimum_total_connector_entries: 26
  minimum_mcp_connector_entries: 12
  minimum_skill_entries: 4
  inventory_sources:
    service_connectors: external-systems/README.md
    mcp_connectors: external-systems/README.md
    skills: external-skills/README.md
    engines: external-systems/README.md
    templates: repository templates and governance assets

principles:
  - Keep capability decisions explicit and evidence-backed.
  - Add runtime enforcement only after registry coverage has tests.
  - Every connector, skill, accelerator, and template family listed in repository docs must have a registry entry or an explicit removed/deprecated entry.
  - Skills are workflow packages; LLM accelerators are support runtimes and must not be counted as ordinary skills.
  - Connectors start narrow and opt-in unless a separate PR proves a broader path.
  - Every task class must declare required evidence, not only a capability name.
  - Waivers must be explicit when an applicable capability is not used.

source_classes:
  skill:
    description: "A Claude workflow capability or external skill wrapper listed under external-skills/."
  llm_accelerator:
    description: "A supporting model/runtime used for generation, review, summarization, or context-cost reduction."
  connector:
    description: "An external service, MCP connector, or source tool used to retrieve or update external state."
  source_of_truth:
    description: "A repo file, spec, official doc, or project-management record used before implementation."
  validator:
    description: "A local check that verifies a required condition."
  template:
    description: "A reusable project, hook, command, connector, settings, or workflow template."
  pattern:
    description: "A reusable implementation pattern under patterns/."

selection_rules:
  task_class_required: true
  connector_choice_must_be_recorded: true
  skill_choice_must_be_recorded: true
  accelerator_choice_must_be_recorded: true
  template_choice_must_be_recorded: true
  waiver_required_when_applicable_capability_is_not_used: true
  notion_progress_validation_required_when_selected: true
  mcp_default_write_profile_allowed: false
  broad_mcp_toolsets_allowed_by_default: false
  mcp_auto_install_allowed: false
  managed_settings_runtime_lockdown_allowed: false

task_classes:
  engineering_os_governance:
    description: "Changes to CLAUDE.md, core policies, hooks, scripts, skills, connectors, workflows, capability registry, or adoption docs."
    required_capabilities:
      - routing.task-router-read
      - workflow.workflow-read
      - plan.route-plan-before-write
      - source.github-repo-read
      - validation.policy-change-has-validator
      - validation.coderabbit-policy
    required_evidence:
      - task_router_read
      - workflow_read
      - route_plan_created_before_write
      - github_repo_state_checked
      - validator_added_or_updated_or_waived
      - coderabbit_status_checked_or_manual_review_recorded

  code_change:
    description: "Implementation, refactor, or behavior change in a target project."
    required_capabilities:
      - routing.task-router-read
      - workflow.workflow-read
      - plan.route-plan-before-write
      - source.github-repo-read
    required_evidence:
      - task_router_read
      - workflow_read
      - route_plan_created_before_write
      - repo_files_read_before_write

  new_project_or_saas:
    description: "Creating a new SaaS, full-stack app, automation product, or comparable project from a broad user request."
    required_capabilities:
      - routing.task-router-read
      - workflow.workflow-read
      - spec.project-requirements-captured
      - plan.route-plan-before-write
      - template.project-template-checked
      - pattern.relevant-patterns-checked
      - registry.service-connector-selected
      - registry.mcp-connector-selected
      - skill.superpowers
      - skill.security-review
    required_evidence:
      - user_goal_and_success_criteria_captured
      - users_roles_data_model_and_core_flows_recorded
      - auth_database_billing_hosting_observability_decisions_recorded_or_waived
      - template_checked_or_waived
      - relevant_patterns_checked_or_waived
      - service_connector_or_fallback_recorded
      - mcp_connector_or_fallback_recorded
      - security_review_required_or_waived_with_reason

  external_library_or_api:
    description: "Work involving external packages, SDKs, APIs, frameworks, or services."
    required_capabilities:
      - source.official-docs-checked
      - source.context7-when-available
      - registry.service-connector-selected
    required_evidence:
      - official_docs_checked
      - context7_or_fallback_recorded
      - selected_service_connector_recorded_or_waived

  project_management_or_tracking:
    description: "Planning, progress tracking, project board, or spec-validation work."
    required_capabilities:
      - connector.notion-progress-tracking
    required_evidence:
      - plan_record_created_or_found
      - progress_status_updated
      - milestone_validation_recorded
      - blockers_visible_if_any

  pr_or_merge_workflow:
    description: "Opening, updating, reviewing, or merging a pull request."
    required_capabilities:
      - source.github-repo-read
      - validation.actions-checked
      - validation.review-checked
      - validation.user-merge-approval
    required_evidence:
      - pr_head_sha_checked
      - github_actions_checked
      - review_status_checked_or_manual_review_recorded
      - review_threads_checked
      - explicit_user_merge_approval

  mcp_or_connector_config:
    description: "Adding, changing, activating, or validating connector and MCP configuration."
    required_capabilities:
      - registry.service-connector-selected
      - registry.mcp-connector-selected
      - validation.no-broad-mcp-default
      - validation.mcp-opt-in-only
      - validation.profile-shape-checked
    required_evidence:
      - service_connector_or_fallback_recorded
      - connector_profile_selected
      - read_only_or_write_waiver_recorded
      - no_broad_toolsets_checked
      - opt_in_activation_recorded
      - profile_validator_updated

  ui_or_frontend_work:
    description: "User interface, UX, accessibility, layout, or visual design work."
    required_capabilities:
      - skill.ui-ux-pro-max
      - template.project-template-checked
    required_evidence:
      - ui_skill_used_or_waived
      - template_checked_or_waived
      - accessibility_review_recorded

  security_sensitive_change:
    description: "Authentication, authorization, payments, user data, infrastructure, deployment, hooks, or production-bound code."
    required_capabilities:
      - skill.security-review
      - validation.security-gate-checked
    required_evidence:
      - security_review_run_or_waived_with_reason
      - production_risk_checked
      - pre_merge_gate_recorded

  context_or_large_repo_work:
    description: "Large repositories, long-running sessions, impact analysis, or context-heavy debugging."
    required_capabilities:
      - skill.graphify
      - skill.rtk
      - skill.claude-mem
      - accelerator.nemotron-optional
    required_evidence:
      - graph_or_fallback_recorded
      - output_compaction_available_or_waived
      - memory_context_checked_or_waived
      - accelerator_used_or_waived

capabilities:
  routing.task-router-read:
    kind: source_of_truth
    official_basis: "Engineering OS core/task-router.md"
    evidence_goal: "record that core/task-router.md was read before implementation"
    runtime_status: planned
  workflow.workflow-read:
    kind: source_of_truth
    official_basis: "Engineering OS core/workflow.md"
    evidence_goal: "record that core/workflow.md was read before implementation"
    runtime_status: planned
  spec.project-requirements-captured:
    kind: source_of_truth
    official_basis: "Engineering OS workflow requirements capture"
    evidence_goal: "record users, roles, data model, success criteria, risks, and open questions for broad project requests"
    runtime_status: planned
  plan.route-plan-before-write:
    kind: validator
    official_basis: "Claude Code PreToolUse / Stop hook lifecycle"
    evidence_goal: "route plan exists before implementation actions"
    runtime_status: planned
  source.github-repo-read:
    kind: connector
    official_basis: "GitHub connector / GitHub MCP read-oriented profile"
    evidence_goal: "record repo or PR read operation before repo changes"
    runtime_status: planned
  source.official-docs-checked:
    kind: source_of_truth
    official_basis: "Official vendor documentation or repository"
    evidence_goal: "record official source checked for external API/library decisions"
    runtime_status: planned
  source.context7-when-available:
    kind: connector
    official_basis: "Context7 documentation connector"
    evidence_goal: "record Context7 lookup or approved fallback when external docs are required"
    runtime_status: planned
  registry.service-connector-selected:
    kind: connector
    official_basis: "external-systems/README.md service inventory"
    evidence_goal: "record selected service connector or explain why none applies"
    runtime_status: planned
  registry.mcp-connector-selected:
    kind: connector
    official_basis: "external-systems/README.md MCP connector inventory"
    evidence_goal: "record selected MCP connector or explain why no MCP path applies"
    runtime_status: planned
  connector.notion-progress-tracking:
    kind: connector
    official_basis: "external-systems/connectors/notion/README.md"
    evidence_goal: "Notion plan is updated and validated across execution milestones"
    runtime_status: planned
  skill.superpowers:
    kind: skill
    official_basis: "external-skills/superpowers"
    evidence_goal: "planning/review workflow is used or waived"
    runtime_status: planned
  skill.ui-ux-pro-max:
    kind: skill
    official_basis: "external-skills/ui-ux-pro-max"
    evidence_goal: "UI work uses ui-ux-pro-max or records a waiver"
    runtime_status: planned
  skill.security-review:
    kind: skill
    official_basis: "external-skills/security-review"
    evidence_goal: "security review is run or explicitly waived where allowed"
    runtime_status: planned
  skill.graphify:
    kind: skill
    official_basis: "external-skills/graphify"
    evidence_goal: "code graph or fallback is recorded for context-heavy work"
    runtime_status: planned
  skill.rtk:
    kind: skill
    official_basis: "external-skills/rtk"
    evidence_goal: "output compaction availability or waiver is recorded"
    runtime_status: planned
  skill.claude-mem:
    kind: skill
    official_basis: "external-skills/claude-mem"
    evidence_goal: "memory context availability or waiver is recorded"
    runtime_status: planned
  accelerator.nemotron-optional:
    kind: llm_accelerator
    official_basis: "external-systems/nvidia-nemotron/orchestration.md"
    evidence_goal: "Nemotron engine use or waiver is recorded for generation/review/summarization support"
    runtime_status: planned
  template.project-template-checked:
    kind: template
    official_basis: "templates/ and docs/architecture-guides inventory"
    evidence_goal: "record applicable template checked or waiver reason"
    runtime_status: planned
  pattern.relevant-patterns-checked:
    kind: pattern
    official_basis: "patterns/registry.yaml and patterns/<domain>/"
    evidence_goal: "record relevant patterns checked or waiver reason"
    runtime_status: planned
  validation.coderabbit-policy:
    kind: validator
    official_basis: "Engineering OS core/coderabbit-policy.md"
    evidence_goal: "record CodeRabbit status or manual review waiver when CodeRabbit is unavailable"
    runtime_status: planned
  validation.actions-checked:
    kind: validator
    official_basis: "GitHub Actions"
    evidence_goal: "record workflow checks before merge"
    runtime_status: planned
  validation.review-checked:
    kind: validator
    official_basis: "CodeRabbit / reviewer feedback loop / manual review fallback"
    evidence_goal: "record review checked and comments handled"
    runtime_status: planned
  validation.user-merge-approval:
    kind: validator
    official_basis: "Yotam explicit approval policy"
    evidence_goal: "record explicit user approval before merge"
    runtime_status: planned
  validation.policy-change-has-validator:
    kind: validator
    official_basis: "Engineering OS governance policy"
    evidence_goal: "governance changes include a validator or explicit validator waiver"
    runtime_status: planned
  validation.no-broad-mcp-default:
    kind: validator
    official_basis: "MCP profile hardening"
    evidence_goal: "prove no default broad MCP toolset was introduced"
    runtime_status: planned
  validation.mcp-opt-in-only:
    kind: validator
    official_basis: "Active MCP verification runbook"
    evidence_goal: "prove target-project MCP activation remains explicit opt-in"
    runtime_status: planned
  validation.profile-shape-checked:
    kind: validator
    official_basis: "Connector profile validator pattern"
    evidence_goal: "profile command, args, env, and scopes are checked exactly"
    runtime_status: planned
  validation.security-gate-checked:
    kind: validator
    official_basis: "external-skills/security-review policy"
    evidence_goal: "security gate run or allowed waiver recorded"
    runtime_status: planned

skill_capabilities:
  superpowers:
    path: external-skills/superpowers/
    type: [planning, review, orchestration, self-correction]
    level: L2
    default_profile: every_project
    registry_status: active
  claude-code-workflows:
    path: external-skills/claude-code-workflows/
    type: [review, orchestration]
    level: L1_or_L2_for_large_refactors
    default_profile: pr_review_recommended
    registry_status: active
  security-review:
    path: external-skills/security-review/
    type: [security, review]
    level: L2
    default_profile: production_bound_project
    registry_status: active
  claude-mem:
    path: external-skills/claude-mem/
    type: [memory, context-persistence]
    level: L2
    default_profile: environment_allows
    registry_status: active
  gstack:
    path: external-skills/gstack/
    type: [orchestration, role-simulation]
    level: L1
    default_profile: opt_in_complex_projects
    registry_status: active
  graphify:
    path: external-skills/graphify/
    type: [context-optimization, code-intelligence]
    level: L2
    default_profile: every_project
    registry_status: active
  rtk:
    path: external-skills/rtk/
    type: [context-optimization]
    level: L2
    default_profile: every_project
    registry_status: active
  ui-ux-pro-max:
    path: external-skills/ui-ux-pro-max/
