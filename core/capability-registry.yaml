rejected_for_now:
  openai_agents_runtime_migration: {reason: "Different runtime; not needed to strengthen Claude Code workflow."}
  openai_guardrails_primary_layer: {reason: "Does not directly control Claude Code built-in tools or MCP execution."}
  mcp_reference_servers_as_runtime: {reason: "Reference implementations, not the selected production runtime path."}
  broad_runtime_connector_access: {reason: "Broad service inventory remains available, but installed defaults stay narrow and authenticated by the operator."}

next_pr_contract:
  may_use:
    - routing.task-router-read
    - workflow.workflow-read
    - plan.route-plan-before-write
    - source.github-repo-read
    - registry.service-connector-selected
    - registry.mcp-connector-selected
    - connector.notion-progress-tracking
    - accelerator.nemotron-optional
  must_not_do:
    - add managed settings lockdown
    - add elevated connector defaults
    - auto-install write-capable MCP config
    - write secrets into .mcp.json
    - use broad MCP toolsets such as all or default
    - use frontend-design as an active skill
