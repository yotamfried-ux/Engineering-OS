# Engineering OS capability registry
#
# Status: inventory-backed / plan-level runtime gate.
#
# This is the deterministic source for task-class capability requirements.
# Runtime enforcement is active at the Route Plan + write-gate layer: plans must
# satisfy required capabilities, and implementation writes validate the active
# plan before continuing.

version: 3
status: inventory_backed
runtime_enabled: true
runtime_scope: plan_level_write_gate

coverage_contract:
  minimum_total_connector_entries: 26
  minimum_mcp_connector_entries: 12
  minimum_skill_entries: 4
  inventory_sources:
    service_connectors: external-systems/README.md
    mcp_connectors: external-systems/README.md
    skills: external-skills/README.md
    engines: external-systems/README.md
    templates: repository templates and governance assets

principles:
  - Keep capability decisions explicit and evidence-backed.
  - Runtime enforcement starts at the Route Plan and write-gate layer.
  - Add live tool-call blocking beyond plan evidence only with dedicated tests.
  - Skills are workflow packages; LLM accelerators are support runtimes.
  - MCP server profiles are installed project-wide by default so Claude Code and MCP-aware LLMs can discover them.
  - MCP credentials, OAuth grants, and approval decisions remain outside git and must be completed by the operator.
  - Broad or write-capable MCP toolsets are never the default.
  - Every task class must declare required evidence, not only a capability name.
  - Waivers must be explicit when an applicable capability is not used.

source_classes:
  skill: {description: "Claude workflow capability under external-skills/."}
  llm_accelerator: {description: "Supporting model/runtime backend."}
  connector: {description: "External service, MCP connector, or source tool."}
  source_of_truth: {description: "Repo file, spec, official doc, or project-management record."}
  validator: {description: "Local or CI check that verifies a required condition."}
  template: {description: "Reusable project, hook, command, connector, settings, or workflow template."}
  pattern: {description: "Reusable implementation pattern under patterns/."}

selection_rules:
  task_class_required: true
  connector_choice_must_be_recorded: true
  skill_choice_must_be_recorded: true
  accelerator_choice_must_be_recorded: true
  template_choice_must_be_recorded: true
  waiver_required_when_applicable_capability_is_not_used: true
  notion_progress_validation_required_when_selected: true
  mcp_default_write_profile_allowed: false
  broad_mcp_toolsets_allowed_by_default: false
  mcp_auto_install_allowed: true
  mcp_auto_install_scope: project_scoped_mcp_json
  mcp_auto_install_template: templates/connectors/engineering-os-mcp.json
  mcp_auto_install_script: scripts/install-mcp-servers.sh
  mcp_auto_install_secrets_allowed: false
  managed_settings_runtime_lockdown_allowed: false

task_classes:
  engineering_os_governance:
    description: "Changes to CLAUDE.md, core policies, hooks, scripts, skills, connectors, workflows, capability registry, or adoption docs."
    required_capabilities:
      - routing.task-router-read
      - workflow.workflow-read
      - plan.route-plan-before-write
      - source.github-repo-read
      - validation.policy-change-has-validator
      - validation.coderabbit-policy
    required_evidence:
      - task_router_read
      - workflow_read
      - route_plan_created_before_write
      - github_repo_state_checked
      - validator_added_or_updated_or_waived
      - coderabbit_status_checked_or_manual_review_recorded

  code_change:
    description: "Implementation, refactor, or behavior change in a target project."
    required_capabilities:
      - routing.task-router-read
      - workflow.workflow-read
      - plan.route-plan-before-write
      - source.github-repo-read
    required_evidence:
      - task_router_read
      - workflow_read
      - route_plan_created_before_write
      - repo_files_read_before_write

  new_project_or_saas:
    description: "Creating a new SaaS, full-stack app, automation product, or comparable project from a broad user request."
    required_capabilities:
      - routing.task-router-read
      - workflow.workflow-read
      - spec.project-requirements-captured
      - plan.route-plan-before-write
      - template.project-template-checked
      - pattern.relevant-patterns-checked
      - registry.service-connector-selected
      - registry.mcp-connector-selected
      - skill.superpowers
      - skill.security-review
    required_evidence:
      - user_goal_and_success_criteria_captured
      - users_roles_data_model_and_core_flows_recorded
      - auth_database_billing_hosting_observability_decisions_recorded_or_waived
      - template_checked_or_waived
      - relevant_patterns_checked_or_waived
      - service_connector_or_fallback_recorded
      - mcp_connector_or_fallback_recorded
      - security_review_required_or_waived_with_reason

  external_library_or_api:
    description: "Work involving external packages, SDKs, APIs, frameworks, or services."
    required_capabilities:
      - source.official-docs-checked
      - source.context7-when-available
      - registry.service-connector-selected
    required_evidence:
      - official_docs_checked
      - context7_or_fallback_recorded
      - selected_service_connector_recorded_or_waived

  project_management_or_tracking:
    description: "Planning, progress tracking, project board, or spec-validation work."
    required_capabilities:
      - connector.notion-progress-tracking
    required_evidence:
      - plan_record_created_or_found
      - progress_status_updated
      - milestone_validation_recorded
      - blockers_visible_if_any

  pr_or_merge_workflow:
    description: "Opening, updating, reviewing, or merging a pull request."
    required_capabilities:
      - source.github-repo-read
      - validation.actions-checked
      - validation.review-checked
      - validation.user-merge-approval
    required_evidence:
      - pr_head_sha_checked
      - github_actions_checked
      - review_status_checked_or_manual_review_recorded
      - review_threads_checked
      - explicit_user_merge_approval

  mcp_or_connector_config:
    description: "Adding, changing, activating, or validating connector and MCP configuration."
    required_capabilities:
      - registry.service-connector-selected
      - registry.mcp-connector-selected
      - validation.no-broad-mcp-default
      - validation.mcp-opt-in-only
      - validation.profile-shape-checked
    required_evidence:
      - service_connector_or_fallback_recorded
      - connector_profile_selected
      - read_only_or_write_waiver_recorded
      - no_broad_toolsets_checked
      - project_scoped_mcp_install_recorded
      - profile_validator_updated

  ui_or_frontend_work:
    description: "User interface, UX, accessibility, layout, or visual design work."
    required_capabilities:
      - skill.ui-ux-pro-max
      - template.project-template-checked
    required_evidence:
      - ui_skill_used_or_waived
      - template_checked_or_waived
      - accessibility_review_recorded

  security_sensitive_change:
    description: "Authentication, authorization, payments, user data, infrastructure, deployment, hooks, or production-bound code."
    required_capabilities:
      - skill.security-review
      - validation.security-gate-checked
    required_evidence:
      - security_review_run_or_waived_with_reason
      - production_risk_checked
      - pre_merge_gate_recorded

  context_or_large_repo_work:
    description: "Large repositories, long-running sessions, impact analysis, or context-heavy debugging."
    required_capabilities:
      - skill.graphify
      - skill.rtk
      - skill.claude-mem
      - accelerator.nemotron-optional
    required_evidence:
      - graph_or_fallback_recorded
      - output_compaction_available_or_waived
      - memory_context_checked_or_waived
      - accelerator_used_or_waived

