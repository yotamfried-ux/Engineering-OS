# code-reviewer default configuration — DOCUMENTATION ONLY
# This file is NOT loaded at runtime. It documents the defaults that are
# hard-coded in code_reviewer.py. Update both files together when changing values.
# Override at runtime via CLI flags (--model, --include-ext, --exclude-dir).

model: nvidia/llama-3.3-nemotron-super-49b-v1
fast_model: nvidia/llama-3.1-nemotron-nano-8b-v1

scan:
  max_file_lines: 1500        # chunk files larger than this
  chunk_overlap: 50           # overlap lines between chunks
  rate_limit_delay: 2         # seconds between API calls
  max_retry: 4

skip_dirs:
  - node_modules
  - .git
  - __pycache__
  - .next
  - dist
  - build
  - .venv
  - venv
  - env
  - vendor
  - coverage
  - graphify-out
  - .turbo
  - .cache
  - .idea
  - .vscode
  - .expo
  - .output
  - storybook-static
  - public
  - out

code_extensions:
  - .py
  - .js
  - .ts
  - .tsx
  - .jsx
  - .go
  - .rs
  - .java
  - .rb
  - .c
  - .h
  - .cpp
  - .hpp
  - .cc
  - .cs
  - .kt
  - .swift
  - .php
  - .scala
  - .lua
  - .sh
  - .bash
  - .zsh
  - .sql
  - .graphql
  - .gql
  - .yaml
  - .yml
  - .toml
