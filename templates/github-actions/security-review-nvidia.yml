name: Security Review (NVIDIA NIM)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Required to compute the diff against the previous commit
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Generate diff
        run: git diff HEAD~1 HEAD > /tmp/pr_diff.txt

      - name: Run security review
        id: review
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # Optional overrides:
          # NVIDIA_MODEL: meta/llama-3.1-70b-instruct
          # NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
        run: |
          python scripts/security-review-nvidia.py \
            --diff-file /tmp/pr_diff.txt \
            --output-json > /tmp/findings.json
          echo "findings_count=$(python -c "import json; print(len(json.load(open('/tmp/findings.json'))))")" >> "$GITHUB_OUTPUT"

      - name: Format findings as markdown
        id: format
        run: |
          python - <<'EOF'
          import json, sys

          with open("/tmp/findings.json") as f:
              findings = json.load(f)

          if not findings:
              body = "## 🔒 Security Review\n\n✅ No security issues found."
          else:
              severity_order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "INFO": 4}
              findings.sort(key=lambda x: severity_order.get(x.get("severity", "INFO"), 5))

              emoji_map = {"CRITICAL": "🔴", "HIGH": "🟠", "MEDIUM": "🟡", "LOW": "🔵", "INFO": "⚪"}

              lines = [f"## 🔒 Security Review — {len(findings)} finding(s)\n"]
              for f in findings:
                  sev = f.get("severity", "?")
                  e = emoji_map.get(sev, "⚫")
                  file_ref = f.get("file", "")
                  if f.get("line"):
                      file_ref += f":{f['line']}"
                  lines.append(f"### {e} [{sev}] {f.get('title', 'Finding')}")
                  if file_ref:
                      lines.append(f"**File:** `{file_ref}`")
                  lines.append(f"\n{f.get('description', '')}")
                  lines.append(f"\n**Recommendation:** {f.get('recommendation', '')}\n")
              body = "\n".join(lines)

          with open("/tmp/comment_body.md", "w") as f:
              f.write(body)
          EOF

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/comment_body.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
