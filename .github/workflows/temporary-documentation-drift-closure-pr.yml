name: Temporary documentation drift closure PR runner

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'close/documentation-runtime-state-drift'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: close/documentation-runtime-state-drift
          fetch-depth: 0
      - name: Apply exact canonical replacements
        run: python3 .github/scripts/temporary_documentation_drift_closure.py
      - name: Commit closure and remove temporary files
        shell: bash
        run: |
          rm .github/scripts/temporary_documentation_drift_closure.py
          rm .github/workflows/temporary-documentation-drift-closure.yml
          rm .github/workflows/temporary-documentation-drift-closure-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: close documentation runtime state drift"
          git push origin HEAD:close/documentation-runtime-state-drift
