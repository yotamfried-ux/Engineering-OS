name: pr-policy

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, edited]

permissions:
  contents: read

jobs:
  no-draft-pr:
    name: Require ready-for-review PR
    runs-on: ubuntu-latest
    steps:
      - name: Block draft pull requests
        run: |
          set -euo pipefail
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "ERROR_FOR_AGENT: Pull requests must be ready for review, not draft."
            echo "ACTION: mark the PR ready for review so review gates can run."
            exit 1
          fi
          echo "✅ pull request is ready for review"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate PR review and merge-readiness evidence
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          printf '%s' "$PR_BODY" > /tmp/pr-body.md
          bash scripts/enforcement/check-pr-review-evidence.sh --body /tmp/pr-body.md --head-sha "$PR_HEAD_SHA"
